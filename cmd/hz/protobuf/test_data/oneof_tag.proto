syntax = "proto3";

package test;

option go_package = "cloudwego.hertz.hz";

import "api.proto";

message QuestionnaireQuestion {
  string text = 1;
}

message QuestionnaireSystem {
  string text = 1;
}

message QuestionnaireContent {
  string type = 1 [(api.body) = "type"];
  oneof content {
    QuestionnaireQuestion question = 2 [(api.body) = "content"];
    QuestionnaireSystem system = 3 [(api.body) = "content"];
  }
}
